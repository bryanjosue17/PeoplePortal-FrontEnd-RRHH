apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-rrhh
  namespace: peopleportal
  labels:
    app: frontend-rrhh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-rrhh
  template:
    metadata:
      labels:
        app: frontend-rrhh
    spec:
      containers:
        - name: nginx
          image: ghcr.io/bryanjosue17/peopleportal-frontend-rrhh:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-rrhh-service
  namespace: peopleportal
spec:
  selector:
    app: frontend-rrhh
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30082
